name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip GrimDeck project
        run: |
          if [ ! -f GrimDeck.zip ]; then
            echo "GrimDeck.zip not found in repository root"
            exit 1
          fi
          rm -rf build-src
          mkdir build-src
          unzip -q GrimDeck.zip -d build-src
          PROJECT_DIR=$(find build-src -maxdepth 3 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -printf '%h\n' | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "No Gradle Android project found inside GrimDeck.zip"
            find build-src -maxdepth 3 -type f | sort | head -n 200
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: |
          cd "$PROJECT_DIR"
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimDeck-debug-apk
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

