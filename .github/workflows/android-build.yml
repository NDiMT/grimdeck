name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip GrimDeck project
        run: |
          if [ ! -f GrimDeck.zip ]; then
            echo "GrimDeck.zip not found in repository root"
            exit 1
          fi
          rm -rf build-src apk-output
          mkdir build-src apk-output
          unzip -q GrimDeck.zip -d build-src
          PROJECT_DIR=$(find build-src -maxdepth 4 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" \) -printf '%h\n' | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "No Gradle Android project found inside GrimDeck.zip"
            find build-src -maxdepth 5 -type f | sort | head -n 200
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Detected project dir: $PROJECT_DIR"
          find "$PROJECT_DIR" -maxdepth 2 -type f | sort

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Make Gradle wrapper executable
        run: |
          cd "$PROJECT_DIR"
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
          fi

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          if [ -f ./gradlew ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Collect APK
        run: |
          find "$PROJECT_DIR" -type f -path "*/build/outputs/apk/*/*.apk" -print -exec cp {} "$GITHUB_WORKSPACE/apk-output/" \;
          ls -lah "$GITHUB_WORKSPACE/apk-output"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrimDeck-debug-apk
          path: apk-output/*.apk
          if-no-files-found: error
